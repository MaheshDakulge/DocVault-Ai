name: docsvault_ai
description: "DocsVault AI - Secure offline-first personal document vault powered by Gemini Vision"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.2

  # Local Database (SQLite + Drift ORM)
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # File System & Image
  path_provider: ^2.1.3
  path: ^1.9.0
  image_picker: ^1.1.2
  image: ^4.1.7
  camera: ^0.11.0+2

  # Networking
  dio: ^5.4.3+1
  supabase_flutter: ^2.5.3

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # UI & Animations
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
